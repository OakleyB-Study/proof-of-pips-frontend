# Gitleaks configuration for Proof of Pips
# Run: gitleaks detect --source . --config .gitleaks.toml

title = "Proof of Pips Secret Scanning"

[allowlist]
  description = "Known safe patterns"
  paths = [
    '''node_modules''',
    '''\.git''',
    '''build/''',
    '''package-lock\.json''',
    '''__tests__/''',
    '''\.test\.js$''',
  ]

# Additional rules beyond gitleaks defaults
[[rules]]
  id = "hardcoded-jwt-secret"
  description = "Hardcoded JWT secret"
  regex = '''JWT_SECRET\s*=\s*['"][^'"]{8,}['"]'''
  tags = ["secret", "jwt"]

[[rules]]
  id = "hardcoded-supabase-key"
  description = "Hardcoded Supabase key"
  regex = '''(?i)supabase[_-]?key\s*[:=]\s*['"]eyJ[A-Za-z0-9+/=]+['"]'''
  tags = ["secret", "supabase"]

[[rules]]
  id = "hardcoded-encryption-key"
  description = "Hardcoded encryption key"
  regex = '''ENCRYPTION_KEY\s*=\s*['"][^'"]{16,}['"]'''
  tags = ["secret", "encryption"]
